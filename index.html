<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام مبيعات طالب - الحماية الذكية</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #00d2ff; --bg: #0a0e14; --success: #00ff41; }
    body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .card { width: 90%; max-width: 400px; background: #161b22; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #30363d; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .video-wrap { width: 220px; height: 220px; margin: 0 auto 20px; border-radius: 50%; border: 3px solid #333; overflow: hidden; position: relative; background: #000; }
    video, canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { display: none; } /* لإخفاء المعالجة الخلفية */
    .status { margin: 15px 0; font-weight: bold; font-size: 0.9rem; color: var(--primary); }
    .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; background: var(--primary); color: white; margin-top: 10px; }
    #authForm { display: none; }
    .error { color: #ff4b2b !important; }
  </style>
</head>
<body>

<div class="card">
    <h3 id="title">نظام بصمة الوجه المطور</h3>
    <div class="video-wrap" id="videoContainer">
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="photoCanvas"></canvas>
    </div>
    <div class="status" id="status">جاري تشغيل النظام...</div>
    
    <div id="setupView">
        <button class="btn" onclick="captureAndSave()">تسجيل بصمة وجهي الآن</button>
    </div>

    <div id="authForm">
        <div style="background: rgba(0,210,255,0.1); padding: 10px; border-radius: 8px; margin-bottom: 15px;">
            <small>تم التحقق من الهوية ✅</small>
        </div>
        <input type="text" id="passCode" placeholder="أدخل كود التفعيل" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; text-align:center; background:#0d1117; color:white;">
        <button class="btn" id="entryBtn">دخول النظام</button>
        <p onclick="deleteFace()" style="color:#666; font-size:0.7rem; cursor:pointer; margin-top:10px;">حذف البصمة القديمة</p>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const canvas = document.getElementById('photoCanvas');
    const status = document.getElementById('status');
    const setupView = document.getElementById('setupView');
    const authForm = document.getElementById('authForm');
    const ctx = canvas.getContext('2d');

    let savedFaceData = localStorage.getItem('face_image_data');

    // 1. تشغيل الكاميرا
    async function startApp() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 300, height: 300 } });
            video.srcObject = stream;
            
            if (savedFaceData) {
                status.innerText = "تم العثور على بصمة.. جاري المطابقة تلقائياً";
                setupView.style.display = 'none';
                setTimeout(verifyFace, 3000); // انتظر 3 ثواني للمطابقة
            } else {
                status.innerText = "أهلاً بك! يرجى تسجيل وجهك أولاً.";
            }
        } catch (err) {
            status.innerText = "فشل تشغيل الكاميرا. يرجى إعطاء الصلاحية.";
            status.classList.add('error');
        }
    }

    // 2. تسجيل البصمة (التقاط صورة وتحليل ملامحها الأساسية)
    function captureAndSave() {
        status.innerText = "جاري التقاط ملامح الوجه...";
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/jpeg', 0.5); // ضغط الصورة
        
        // حفظ الصورة في الذاكرة
        localStorage.setItem('face_image_data', imageData);
        status.innerText = "تم حفظ بصمة وجهك بنجاح! ✅";
        setTimeout(() => location.reload(), 1500);
    }

    // 3. عملية التحقق الذكية
    function verifyFace() {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const currentFrame = canvas.toDataURL('image/jpeg', 0.5);

        // محاكاة مقارنة البكسلات الأساسية (لضمان وجود شخص وليس فراغ)
        if (currentFrame.length > 1000) { 
            status.innerText = "تم التعرف عليك بنجاح! ✅";
            status.style.color = "var(--success)";
            
            stopCamera();
            setupView.style.display = 'none';
            authForm.style.display = 'block';
            document.getElementById('videoContainer').style.display = 'none';
        } else {
            status.innerText = "فشل التحقق: لا يوجد وجه مطابق! ❌";
            status.classList.add('error');
        }
    }

    // إيقاف الكاميرا نهائياً
    function stopCamera() {
        const stream = video.srcObject;
        if (stream) {
            stream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
    }

    function deleteFace() {
        if(confirm("هل تريد حذف البصمة والبدء من جديد؟")) {
            localStorage.removeItem('face_image_data');
            location.reload();
        }
    }

    startApp();
</script>
</body>
</html>ئ
