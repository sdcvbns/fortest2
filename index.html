<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الحماية الذكي - مبيعات طالب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    <style>
        :root { --primary: #00d2ff; --error: #ff4b2b; --bg: #0a0e14; }
        body { background: var(--bg); color: white; font-family: 'Cairo', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { width: 90%; max-width: 400px; background: #161b22; padding: 25px; border-radius: 20px; text-align: center; border: 1px solid #30363d; }
        .video-wrap { width: 220px; height: 220px; margin: 0 auto 20px; border-radius: 50%; border: 3px solid #333; overflow: hidden; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .status { margin: 15px 0; font-weight: bold; font-size: 0.9rem; }
        .btn { width: 100%; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; background: var(--primary); color: white; }
        #authForm { display: none; }
        .loading-dots:after { content: ' .'; animation: dots 1.5s steps(5, end) infinite; }
        @keyframes dots { 0%, 20% { color: rgba(0,0,0,0); text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 40% { color: white; text-shadow: .5em 0 0 rgba(0,0,0,0), 1em 0 0 rgba(0,0,0,0); } 60% { text-shadow: .5em 0 0 white, 1em 0 0 rgba(0,0,0,0); } 80%, 100% { text-shadow: .5em 0 0 white, 1em 0 0 white; } }
    </style>
</head>
<body>

<div class="card">
    <h3 id="title">نظام التحقق من الهوية الذكي</h3>
    <div class="video-wrap" id="videoContainer">
        <video id="webcam" autoplay playsinline muted></video>
    </div>
    <div class="status" id="status">جاري تحميل محرك الذكاء الاصطناعي...</div>
    
    <div id="setupActions">
        <button class="btn" id="regBtn" onclick="registerFace()" disabled>تسجيل وجهك الآن</button>
    </div>

    <div id="authForm">
        <input type="text" id="passCode" placeholder="أدخل كود التفعيل" style="width:100%; padding:10px; margin-bottom:10px; border-radius:8px; border:none; text-align:center;">
        <button class="btn" id="entryBtn">دخول النظام</button>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const regBtn = document.getElementById('regBtn');
    let savedDescriptor = null;

    // 1. تحميل الموديلات وتشغيل الكاميرا
    async function initSystem() {
        try {
            // تحميل ملفات تعريف الملامح من سيرفر خارجي سريع
            const MODEL_URL = 'https://raw.githubusercontent.com/justadudewhohacks/face-api.js/master/weights';
            await Promise.all([
                faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
                faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
            ]);

            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            
            status.innerText = "المحرك جاهز. يرجى التموضع أمام الكاميرا.";
            regBtn.disabled = false;

            // التحقق إذا كان مسجلاً مسبقاً
            const savedData = localStorage.getItem('face_descriptor');
            if (savedData) {
                savedDescriptor = new Float32Array(Object.values(JSON.parse(savedData)));
                status.innerText = "تم العثور على بصمة. جاري المطابقة...";
                startVerification();
            }
        } catch (err) {
            status.innerText = "خطأ: تأكد من اتصال الإنترنت وصلاحية الكاميرا.";
        }
    }

    // 2. تسجيل بصمة الوجه (تحويل الوجه لأرقام)
    async function registerFace() {
        status.innerText = "جاري التقاط ملامح الوجه... لا تتحرك";
        const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

        if (detections) {
            localStorage.setItem('face_descriptor', JSON.stringify(detections.descriptor));
            status.innerText = "تم حفظ بصمتك بنجاح! ✅";
            setTimeout(() => location.reload(), 2000);
        } else {
            status.innerText = "فشل الالتقاط: لم يتم اكتشاف وجه! ❌";
        }
    }

    // 3. التحقق الحقيقي (مقارنة الوجه الحالي بالمخزن)
    async function startVerification() {
        const checkInterval = setInterval(async () => {
            const detections = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();

            if (detections) {
                const distance = faceapi.euclideanDistance(savedDescriptor, detections.descriptor);
                
                // إذا كانت المسافة أقل من 0.6 يعني الشخص هو نفسه (كلما قل الرقم زادت الدقة)
                if (distance < 0.5) {
                    status.innerText = "تم التعرف عليك بنجاح ✅";
                    status.style.color = "#00ff41";
                    clearInterval(checkInterval);
                    stopCamera();
                    showFinalForm();
                } else {
                    status.innerText = "وجه غير مطابق! الدخول مرفوض ❌";
                    status.style.color = "#ff4b2b";
                }
            } else {
                status.innerText = "لم يتم اكتشاف وجه أمام الكاميرا!";
            }
        }, 1000);
    }

    function stopCamera() {
        const stream = video.srcObject;
        const tracks = stream.getTracks();
        tracks.forEach(track => track.stop());
        video.srcObject = null;
        document.getElementById('videoContainer').style.display = 'none';
    }

    function showFinalForm() {
        document.getElementById('setupActions').style.display = 'none';
        document.getElementById('authForm').style.display = 'block';
    }

    function resetSystem() {
        localStorage.removeItem('face_descriptor');
        location.reload();
    }

    initSystem();
</script>
</body>
</html>
