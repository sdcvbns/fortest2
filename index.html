<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>نظام إدارة البصمة - مبيعات طالب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --primary: #00d2ff;
      --accent: #3a7bd5;
      --bg: #0a0e14;
      --card: #161b22;
      --success: #23d5ab;
      --danger: #ee5253;
    }

    body, html {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background: var(--bg); color: white;
      font-family: 'Cairo', sans-serif; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }

    /* الحاوية الرئيسية */
    .main-wrapper {
      width: 90%; max-width: 450px;
      background: var(--card); border-radius: 24px; padding: 25px;
      border: 1px solid rgba(0, 210, 255, 0.1);
      box-shadow: 0 15px 35px rgba(0,0,0,0.5);
      text-align: center; position: relative;
    }

    /* تحسين الكاميرا والظهور */
    .face-box {
      width: 200px; height: 200px; margin: 0 auto 20px;
      border-radius: 50%; border: 4px solid #30363d;
      position: relative; overflow: hidden; background: #000;
    }

    .face-box.active { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); }
    .face-box.success { border-color: var(--success); box-shadow: 0 0 20px var(--success); }

    video {
      width: 100%; height: 100%; object-fit: cover;
      transform: scaleX(-1); opacity: 1; display: block;
    }

    .scan-line {
      position: absolute; width: 100%; height: 3px;
      background: var(--primary); top: -10px; z-index: 10;
    }

    /* الأزرار والحقول */
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-weight: bold; cursor: pointer; font-size: 1rem;
      transition: all 0.3s; margin-top: 10px;
    }

    .btn-primary { background: linear-gradient(90deg, var(--primary), var(--accent)); color: white; }
    .btn-danger { background: rgba(238, 82, 81, 0.1); color: var(--danger); border: 1px solid var(--danger); font-size: 0.8rem; }
    .btn-danger:hover { background: var(--danger); color: white; }

    .input-code {
      width: 100%; padding: 14px; margin: 15px 0;
      background: #0d1117; border: 1px solid #30363d;
      border-radius: 12px; color: white; text-align: center;
    }

    /* حالات الواجهة */
    #verifyView, #setupView { display: none; }
    .visible { display: block !important; animation: fadeIn 0.5s; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* مودال الروبوت */
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.95);
      display: none; align-items: center; justify-content: center; z-index: 1000;
    }
  </style>
</head>
<body>

  <div class="main-wrapper">
    <div id="setupView">
        <h2 style="margin-bottom: 5px;">تسجيل بصمة جديدة</h2>
        <p style="color: #8b949e; font-size: 0.9rem;">يرجى التقاط بصمة وجهك لتأمين الحساب</p>
        <div class="face-box" id="setupBox">
            <video id="setupVideo" autoplay playsinline></video>
            <div class="scan-line" id="setupLine"></div>
        </div>
        <button class="btn btn-primary" onclick="enrollFace()">بدء التسجيل الرقمي</button>
    </div>

    <div id="verifyView">
        <h2 style="margin-bottom: 5px;">تأكيد الهوية</h2>
        <p style="color: #8b949e; font-size: 0.9rem;">مرحباً بك مجدداً في نظام مبيعات طالب</p>
        <div class="face-box" id="verifyBox">
            <video id="verifyVideo" autoplay playsinline></video>
            <div class="scan-line" id="verifyLine"></div>
        </div>
        <div id="statusText" style="margin-bottom: 10px; font-weight: bold; color: var(--primary);">بانتظار المسح...</div>
        
        <div id="finalAction" style="display:none;">
            <input type="text" id="codeInp" class="input-code" placeholder="أدخل كود التفعيل">
            <button class="btn btn-primary" id="verifyBtn">دخول النظام</button>
            <button class="btn btn-danger" onclick="deleteFaceData()">حذف البصمة الحالية وتسجيل أخرى</button>
        </div>
    </div>
  </div>

  <div class="modal" id="robotModal">
      <div style="background:white; color:black; padding:30px; border-radius:20px; text-align:center;">
          <img src="https://g.top4top.io/p_37158rmbv0.png" width="100">
          <h3 style="color:red;">تنبيه أمني!</h3>
          <p>لا يمكنك الدخول بدون كتابة الكود. 🤖</p>
          <button class="btn btn-primary" style="background:#000" onclick="closeRobot()">فهمت</button>
      </div>
  </div>

  <script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>

  <script>
    const isEnrolled = localStorage.getItem('face_enrolled') === 'true';
    const setupView = document.getElementById('setupView');
    const verifyView = document.getElementById('verifyView');
    const robotModal = document.getElementById('robotModal');

    // تشغيل الواجهة المناسبة عند التحميل
    window.onload = () => {
        if (isEnrolled) {
            verifyView.classList.add('visible');
            startCamera('verifyVideo');
        } else {
            setupView.classList.add('visible');
            startCamera('setupVideo');
        }
    };

    async function startCamera(videoId) {
        const videoElement = document.getElementById(videoId);
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 400, height: 400 } 
            });
            videoElement.srcObject = stream;
        } catch (err) {
            alert("يرجى تفعيل الكاميرا للمتابعة");
        }
    }

    // منطق التسجيل
    function enrollFace() {
        const line = document.getElementById('setupLine');
        const box = document.getElementById('setupBox');
        box.classList.add('active');
        
        gsap.to(line, { top: "100%", duration: 1.5, repeat: 3, yoyo: true });
        
        setTimeout(() => {
            localStorage.setItem('face_enrolled', 'true');
            alert("تم حفظ بصمة الوجه بنجاح ✅");
            location.reload();
        }, 5000);
    }

    // منطق التحقق والهروب
    setTimeout(() => {
        if (isEnrolled) {
            const line = document.getElementById('verifyLine');
            const box = document.getElementById('verifyBox');
            box.classList.add('success');
            gsap.to(line, { opacity: 0 });
            document.getElementById('statusText').innerHTML = "تمت المطابقة بنجاح ✅";
            document.getElementById('finalAction').style.display = 'block';
        }
    }, 4000);

    // الهروب الذكي
    const verifyBtn = document.getElementById('verifyBtn');
    const codeInp = document.getElementById('codeInp');
    let escapes = 0;

    verifyBtn.addEventListener('mouseenter', () => {
        if (!codeInp.value.trim()) {
            escapes++;
            if (escapes > 3) { robotModal.style.display = 'flex'; escapes = 0; return; }
            gsap.to(verifyBtn, { x: (Math.random()-0.5)*200, y: (Math.random()-0.5)*150, duration: 0.2 });
        }
    });

    function closeRobot() {
        robotModal.style.display = 'none';
        gsap.to(verifyBtn, { x: 0, y: 0, duration: 0.5 });
    }

    function deleteFaceData() {
        if (confirm("هل تريد حذف البصمة الحالية؟ سيتم الخروج من النظام.")) {
            localStorage.removeItem('face_enrolled');
            location.reload();
        }
    }

    codeInp.addEventListener('input', () => { if(codeInp.value.trim()) gsap.to(verifyBtn, {x:0, y:0}); });
  </script>
</body>
</html>
