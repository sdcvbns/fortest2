<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام الحماية القصوى - مبيعات طالب</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --security-green: #00ff41;
      --security-red: #ff3e3e;
      --bg-dark: #050505;
    }

    body {
      background: var(--bg-dark); color: white;
      font-family: 'Cairo', sans-serif; margin: 0;
      display: flex; align-items: center; justify-content: center; height: 100vh;
    }

    .security-card {
      width: 90%; max-width: 420px; background: #111;
      padding: 30px; border-radius: 25px; border: 1px solid #222;
      text-align: center; box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }

    .camera-vault {
      width: 240px; height: 240px; margin: 0 auto 20px;
      border-radius: 50%; border: 2px solid #333;
      position: relative; overflow: hidden; background: #000;
      transition: all 0.5s ease;
    }

    .camera-vault.locked { border-color: var(--security-red); box-shadow: 0 0 25px var(--security-red); }
    .camera-vault.verified { border-color: var(--security-green); box-shadow: 0 0 25px var(--security-green); }

    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

    .digital-grid {
      position: absolute; inset: 0;
      background: linear-gradient(rgba(0, 255, 65, 0.1) 1px, transparent 1px),
                  linear-gradient(90deg, rgba(0, 255, 65, 0.1) 1px, transparent 1px);
      background-size: 20px 20px; pointer-events: none; opacity: 0.3;
    }

    .action-btn {
      width: 100%; padding: 15px; border-radius: 12px; border: none;
      font-weight: bold; cursor: pointer; transition: 0.3s;
      background: var(--security-green); color: black; font-size: 1.1rem;
    }

    .status-msg { margin: 15px 0; font-weight: bold; min-height: 24px; }
    
    #authForm { display: none; }
  </style>
</head>
<body>

<div class="security-card">
    <h2 id="title">بروتوكول التحقق الثنائي</h2>
    <div class="camera-vault" id="vault">
        <video id="webcam" autoplay playsinline></video>
        <div class="digital-grid"></div>
        <div id="scanLine" style="position:absolute; width:100%; height:2px; background:var(--security-green); top:0; box-shadow:0 0 10px var(--security-green); display:none;"></div>
    </div>

    <div class="status-msg" id="status">بانتظار تهيئة النظام...</div>

    <div id="setupActions">
        <button class="action-btn" onclick="startEnrollment()">تسجيل بصمة الوجه المعتمدة</button>
    </div>

    <div id="authForm">
        <input type="text" id="passCode" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; border:none; text-align:center;" placeholder="أدخل كود الوصول">
        <button class="action-btn" id="entryBtn">دخول النظام الآمن</button>
        <p onclick="resetSystem()" style="color:#666; font-size:0.8rem; cursor:pointer; margin-top:10px;">إعادة تعيين الهوية (حذف البصمة)</p>
    </div>
</div>

<script src="https://unpkg.co/gsap@3/dist/gsap.min.js"></script>
<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const vault = document.getElementById('vault');
    const scanLine = document.getElementById('scanLine');
    let currentStream = null;

    let isEnrolled = localStorage.getItem('face_hash') !== null;

    async function init() {
        try {
            currentStream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = currentStream;
            status.innerText = isEnrolled ? "نظام التحقق نشط: جاري التعرف..." : "يرجى تسجيل بصمة الوجه أولاً";
            
            if(isEnrolled) {
                setTimeout(startVerification, 2000);
            }
        } catch (e) {
            status.innerText = "خطأ: الكاميرا محجوبة!";
        }
    }

    // وظيفة إغلاق الكاميرا فور النجاح
    function stopCamera() {
        if (currentStream) {
            currentStream.getTracks().forEach(track => track.stop());
            video.srcObject = null;
        }
    }

    function startEnrollment() {
        status.innerText = "جاري تحليل ملامح الوجه...";
        scanLine.style.display = "block";
        gsap.to(scanLine, { top: "100%", duration: 1.5, repeat: 3, yoyo: true });

        setTimeout(() => {
            localStorage.setItem('face_hash', 'SECURE_USER_VALID');
            status.innerText = "تم حفظ البصمة بنجاح! ✅";
            vault.classList.add('verified');
            setTimeout(() => location.reload(), 1500);
        }, 5000);
    }

    function startVerification() {
        status.innerText = "جاري مطابقة الوجه بالبصمة...";
        scanLine.style.display = "block";
        gsap.to(scanLine, { top: "100%", duration: 1, repeat: 3, yoyo: true });

        setTimeout(() => {
            if(localStorage.getItem('face_hash') === 'SECURE_USER_VALID') {
                status.innerText = "تم التحقق بنجاح! مرحباً بك ✅";
                status.style.color = "var(--security-green)";
                vault.classList.remove('locked');
                vault.classList.add('verified');
                
                // --- الحل هنا: إغلاق الكاميرا وإخفاء الإطار الجمالي ---
                stopCamera();
                gsap.to(vault, { height: 0, opacity: 0, marginBottom: 0, duration: 0.8, ease: "power2.inOut" });
                
                document.getElementById('setupActions').style.display = "none";
                document.getElementById('authForm').style.display = "block";
            } else {
                status.innerText = "فشل التحقق: الوجه غير مطابق! ❌";
                status.style.color = "var(--security-red)";
                vault.classList.add('locked');
            }
        }, 4000);
    }

    const entryBtn = document.getElementById('entryBtn');
    const passInp = document.getElementById('passCode');
    entryBtn.addEventListener('mouseenter', () => {
        if (!passInp.value.trim()) {
            gsap.to(entryBtn, { x: (Math.random()-0.5)*200, y: (Math.random()-0.5)*150, duration: 0.2 });
        }
    });

    function resetSystem() {
        if(confirm("سيتم مسح بصمة وجهك المسجلة. هل أنت متأكد؟")) {
            localStorage.removeItem('face_hash');
            location.reload();
        }
    }

    init();
</script>
</body>
</html>
